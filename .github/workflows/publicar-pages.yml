name: Publicar Sistema de Pesagem no GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  preparar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar arquivos do repositório
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v6

      - name: Enviar arquivos HTML para publicação
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

  publicar:
    needs: preparar
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.publicacao.outputs.page_url }}
    steps:
      - name: Publicar no GitHub Pages
        id: publicacao
        uses: actions/deploy-pages@v5
